name: Weekly Content Drafts

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 9am ET (14:00 UTC)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run content engine
        run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_ARTIST_TABLE: ${{ secrets.AIRTABLE_ARTIST_TABLE }}
          FOUND_NEWS_STORIES_SHEETS_ID: ${{ secrets.FOUND_NEWS_STORIES_SHEETS_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
